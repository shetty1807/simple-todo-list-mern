# Save as: .circleci/config.yml
version: 2.1

parameters:
  testneo_tags:
    type: string
    default: ""
  testneo_workers:
    type: string
    default: "3"

jobs:
  testneo-tests:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      
      - run:
          name: Install dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y python3 jq
      
      - run:
          name: Run TestNeo Tests
          command: |
            # Build tags JSON
            TAGS_INPUT="<< pipeline.parameters.testneo_tags >>"
            if [ -n "$TAGS_INPUT" ]; then
              TAGS_JSON=$(echo "$TAGS_INPUT" | python3 -c "import sys,json; print(json.dumps([t.strip() for t in sys.stdin.read().strip().split(',')]))")
              echo "🏷️  Running tests with tags: $TAGS_INPUT"
            else
              TAGS_JSON="null"
              echo "🧪 Running ALL tests"
            fi

            # 1. Trigger CI job
            RESPONSE=$(curl -sf -X POST \
              "$TESTNEO_SERVER/api/web/v1/ci/trigger" \
              -H "X-API-Key: $TESTNEO_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"project_id\": $TESTNEO_PROJECT_ID,
                \"tags\": $TAGS_JSON,
                \"branch\": \"$CIRCLE_BRANCH\",
                \"commit_sha\": \"$CIRCLE_SHA1\",
                \"triggered_by\": \"circleci\"
              }")

            JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
            TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['total_tests'])")
            echo "✅ Job $JOB_ID — $TOTAL tests queued"

            # 2. Run tests in Docker
            docker run --rm --shm-size=2g \
              -e TESTNEO_SERVER="$TESTNEO_SERVER" \
              -e TESTNEO_API_KEY="$TESTNEO_API_KEY" \
              -e CI_JOB_ID="$JOB_ID" \
              -e TESTNEO_WORKERS="<< pipeline.parameters.testneo_workers >>" \
              testneo/ci-runner:latest
          no_output_timeout: 30m

workflows:
  version: 2
  test:
    jobs:
      - testneo-tests
