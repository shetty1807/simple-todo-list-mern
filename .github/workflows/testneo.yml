name: TestNeo ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TESTNEO_SERVER: ${{ secrets.TESTNEO_SERVER }}
      TESTNEO_API_KEY: ${{ secrets.TESTNEO_API_KEY }}
      TESTNEO_PROJECT_ID: ${{ secrets.TESTNEO_PROJECT_ID }}
      TESTNEO_TAGS: smoke
      TESTNEO_WORKERS: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq

      - name: Check secrets presence
        run: |
          echo "Checking required secrets..."

          if [ -z "$TESTNEO_SERVER" ]; then
            echo "ERROR: TESTNEO_SERVER is missing"
            exit 1
          fi

          if [ -z "$TESTNEO_API_KEY" ]; then
            echo "ERROR: TESTNEO_API_KEY is missing"
            exit 1
          fi

          if [ -z "$TESTNEO_PROJECT_ID" ]; then
            echo "ERROR: TESTNEO_PROJECT_ID is missing"
            exit 1
          fi

          echo "All required secrets are present."

      - name: Debug values
        run: |
          echo "SERVER=[$TESTNEO_SERVER]"
          echo "PROJECT_ID=[$TESTNEO_PROJECT_ID]"
          echo "API_KEY_LENGTH=${#TESTNEO_API_KEY}"
          echo "TAGS=[$TESTNEO_TAGS]"
          echo "WORKERS=[$TESTNEO_WORKERS]"

      - name: Skip TestNeo Agent Download (Temporary Fix)
        run: |
         echo "Skipping TestNeo agent download due to 401 issue"
          set -e

          echo "Trying download with X-API-Key header..."
          if curl -sS -fL \
            -H "X-API-Key: $TESTNEO_API_KEY" \
            "$TESTNEO_SERVER/api/web/v1/agents/download-bundle?project_id=$TESTNEO_PROJECT_ID" \
            -o testneo_bundle.zip; then
            echo "Download succeeded with X-API-Key header."
            exit 0
          fi

          echo "X-API-Key header failed. Trying Bearer token..."
          if curl -sS -fL \
            -H "Authorization: Bearer $TESTNEO_API_KEY" \
            "$TESTNEO_SERVER/api/web/v1/agents/download-bundle?project_id=$TESTNEO_PROJECT_ID" \
            -o testneo_bundle.zip; then
            echo "Download succeeded with Bearer token."
            exit 0
          fi

          echo "Bearer token failed. Trying api_key in URL..."
          if curl -sS -fL \
            "$TESTNEO_SERVER/api/web/v1/agents/download-bundle?project_id=$TESTNEO_PROJECT_ID&api_key=$TESTNEO_API_KEY" \
            -o testneo_bundle.zip; then
            echo "Download succeeded with api_key in URL."
            exit 0
          fi

          echo "ERROR: All download authentication methods failed."
          exit 1

      - name: Extract TestNeo Bundle
        run: |
          unzip -o testneo_bundle.zip -d testneo_bundle
          echo "Bundle extracted successfully."
          ls -la
          ls -la testneo_bundle || true

      - name: Build tags JSON
        run: |
          if [ -n "$TESTNEO_TAGS" ]; then
            TAGS_JSON=$(python -c "import json; print(json.dumps([x.strip() for x in '$TESTNEO_TAGS'.split(',') if x.strip()]))")
          else
            TAGS_JSON="[]"
          fi

          echo "TAGS_JSON=$TAGS_JSON" >> "$GITHUB_ENV"
          echo "Generated tags JSON: $TAGS_JSON"

      - name: Trigger TestNeo CI Job
        run: |
          echo "Triggering TestNeo CI job..."

          curl -sS -fL -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $TESTNEO_API_KEY" \
            "$TESTNEO_SERVER/api/web/v1/ci/trigger" \
            -d "{
              \"project_id\": \"$TESTNEO_PROJECT_ID\",
              \"branch\": \"${GITHUB_REF_NAME}\",
              \"commit_sha\": \"${GITHUB_SHA}\",
              \"tags\": ${TAGS_JSON},
              \"workers\": ${TESTNEO_WORKERS},
              \"triggered_by\": \"github_actions\"
            }"

          echo "Trigger request sent successfully."

      - name: Run TestNeo Tests
        run: |
          echo "TestNeo trigger completed."
          echo "Add project-specific test runner commands here if needed."

      - name: Check Results
        run: |
          echo "Workflow finished."