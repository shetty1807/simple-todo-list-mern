name: TestNeo Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test tags to run (comma-separated, e.g. smoke,login)'
        required: false
        default: ''
      workers:
        description: 'Parallel workers (default 3, max 10)'
        required: false
        default: '3'

env:
  TESTNEO_TAGS: ''   # e.g. 'smoke' or 'smoke,login'

jobs:
  test:
    name: TestNeo Tests
    runs-on: ubuntu-latest
    steps:
      - name: Run TestNeo Tests
        run: |
          # Build tags array for API
          TAGS_INPUT="${{ github.event.inputs.tags || env.TESTNEO_TAGS }}"
          TAGS_JSON="null"
          if [ -n "$TAGS_INPUT" ]; then
            TAGS_JSON=$(echo "$TAGS_INPUT" | python3 -c "import sys,json; print(json.dumps([t.strip() for t in sys.stdin.read().strip().split(',')]))")
            echo "🏷️  Running tests with tags: $TAGS_INPUT"
          else
            echo "🧪 Running ALL tests"
          fi

          # 1. Trigger CI job
          RESPONSE=$(curl -sf -X POST \
            "${{ secrets.TESTNEO_SERVER }}/api/web/v1/ci/trigger" \
            -H "X-API-Key: ${{ secrets.TESTNEO_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"project_id\": ${{ secrets.TESTNEO_PROJECT_ID }},
              \"tags\": $TAGS_JSON,
              \"branch\": \"${{ github.ref_name }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"triggered_by\": \"github_actions\"
            }")

          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          TOTAL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['total_tests'])")
          echo "✅ Job $JOB_ID — $TOTAL tests queued"

          # 2. Run tests in Docker (results auto-publish to TestNeo)
          docker run --rm --shm-size=2g \
            -e TESTNEO_SERVER="${{ secrets.TESTNEO_SERVER }}" \
            -e TESTNEO_API_KEY="${{ secrets.TESTNEO_API_KEY }}" \
            -e CI_JOB_ID="$JOB_ID" \
            -e TESTNEO_WORKERS="${{ github.event.inputs.workers || '3' }}" \
            testneo/ci-runner:latest

          # Exit code 0 = all passed ✅, 1 = failures ❌
          # Full reports → TestNeo dashboard → CI/CD → Runs tab
        timeout-minutes: 30
