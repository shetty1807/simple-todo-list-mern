name: TestNeo CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      # 🔍 DEBUG STEP
      - name: Debug secrets
        run: |
          echo "SERVER=[$TESTNEO_SERVER]"
          echo "PROJECT=[$TESTNEO_PROJECT_ID]"
          echo "API_KEY_LENGTH=${#TESTNEO_API_KEY}"
        env:
          TESTNEO_SERVER: ${{ secrets.TESTNEO_SERVER }}
          TESTNEO_PROJECT_ID: ${{ secrets.TESTNEO_PROJECT_ID }}
          TESTNEO_API_KEY: ${{ secrets.TESTNEO_API_KEY }}

      # 🔽 FIXED DOWNLOAD STEP
      - name: Download TestNeo Agent
        run: |
          echo "Downloading TestNeo agent..."
          curl -fL -H "X-API-Key: $TESTNEO_API_KEY" \
          "$TESTNEO_SERVER/api/web/v1/agents/download-bundle?project_id=$TESTNEO_PROJECT_ID" \
          -o testneo_bundle.zip
        env:
          TESTNEO_SERVER: ${{ secrets.TESTNEO_SERVER }}
          TESTNEO_API_KEY: ${{ secrets.TESTNEO_API_KEY }}
          TESTNEO_PROJECT_ID: ${{ secrets.TESTNEO_PROJECT_ID }}