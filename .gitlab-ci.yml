variables:
  TESTNEO_TAGS: ""   # e.g. 'smoke' or 'smoke,login'
  TESTNEO_WORKERS: "3"  # Parallel workers (default 3, max 10)

stages:
  - test

testneo:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl python3 jq
  script:
    - |
      if [ -n "$TESTNEO_TAGS" ]; then
        TAGS_JSON=$(echo "$TESTNEO_TAGS" | python3 -c 'import sys,json; print(json.dumps([t.strip() for t in sys.stdin.read().split(",") if t.strip()]))')
        echo "Running tests with tags: $TESTNEO_TAGS"
      else
        TAGS_JSON="[]"
        echo "Running all tests"
      fi

      PAYLOAD=$(cat <<EOF
      {
        "project_id": $TESTNEO_PROJECT_ID,
        "workers": $TESTNEO_WORKERS,
        "tags": $TAGS_JSON,
        "source": "gitlab-ci",
        "branch": "$CI_COMMIT_REF_NAME",
        "commit": "$CI_COMMIT_SHA"
      }
      EOF
      )

      echo "Triggering TestNeo run..."
      RESPONSE=$(curl -s -X POST "$TESTNEO_SERVER/api/ci/run" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD")

      echo "$RESPONSE" | jq .
            echo "Triggering TestNeo run..."
      RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$TESTNEO_SERVER/api/ci/run" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD")

      echo "$RESPONSE"

      STATUS=$(echo "$RESPONSE" | tail -n1 | sed 's/HTTP_STATUS://')
      BODY=$(echo "$RESPONSE" | sed '$d')

      echo "$BODY" | jq . || echo "$BODY"

      if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
        echo "TestNeo API call failed with status $STATUS"
        exit 1
      fi